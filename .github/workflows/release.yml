name: Release

on:
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "base/**"
      - "components/**"
      - "themes/**"
      - "brand/**"
      - "js/**"
      - "build.sh"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build CSS bundle
        run: sh build.sh

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Add version banner to CSS and JS
        run: |
          sed -i "1i/* dzarlax.dev Design System ${{ steps.version.outputs.tag }} — https://github.com/dzarlax/design-system */" dist/dzarlax.css
          sed -i "1i/* dzarlax.dev Design System ${{ steps.version.outputs.tag }} — https://github.com/dzarlax/design-system */" dist/dzarlax.js

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/dzarlax.css
            dist/dzarlax.js
